<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div class="logo-area" routerLink="/dashboard">
        <span class="logo-emoji">♨️</span>
        <span class="logo-text">GrillMe</span>
        <span class="logo-subtext">Angular</span>
      </div>

      <nav class="nav-links">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
        <a routerLink="/learn" routerLinkActive="active" class="nav-item">Learn</a>
        <a routerLink="/interview" routerLinkActive="active" class="nav-item">Simulator</a>
        <a routerLink="/topic-matrix" routerLinkActive="active" class="nav-item">Skills Matrix</a>
        <a routerLink="/playground" routerLinkActive="active" class="nav-item">Playground</a>
        <a routerLink="/performance" routerLinkActive="active" class="nav-item">Analytics</a>
      </nav>

      <div class="header-actions">
        <!-- Readiness score indicator -->
        <div class="header-readiness" 
             [class.mid]="state.readinessScore() >= 50 && state.readinessScore() < 80"
             [class.high]="state.readinessScore() >= 80">
          <span class="readiness-lbl">Readiness:</span>
          <span class="readiness-val">{{ state.readinessScore() }}%</span>
        </div>

        <button (click)="toggleTheme()" class="theme-toggle" [title]="theme() === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'">
          <div class="theme-icon-container">
            @if (theme() === 'light') {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
            }
          </div>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
